<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Aprovação - Caveira </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');

        :root {
            --police-blue: #0f172a;
            --police-gold: #fbbf24;
            --tactical-gray: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #f1f5f9;
        }

        .police-title {
            font-family: 'Black Ops One', cursive;
            letter-spacing: 2px;
            color: var(--police-gold);
        }

        .flip-card {
            perspective: 1000px;
            height: 380px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            border-radius: 0.75rem;
            border: 2px solid #334155;
        }

        .flip-card-front {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .flip-card-back {
            background: #1e293b;
            color: white;
            transform: rotateY(180deg);
            border-color: var(--police-gold);
        }

        .status-btn {
            transition: all 0.2s;
            filter: grayscale(0.4);
        }

        .status-btn:hover {
            filter: grayscale(0);
            transform: translateY(-2px);
        }

        .badge-gold {
            background-color: rgba(251, 191, 36, 0.1);
            border: 1px solid var(--police-gold);
            color: var(--police-gold);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <header class="text-center mb-8 w-full max-w-2xl">
        <div class="inline-block px-3 py-1 rounded badge-gold text-xs font-bold mb-3 uppercase tracking-tighter">
            Divisão de Estudos Estratégicos
        </div>
        <h1 class="text-4xl police-title mb-2">OPERAÇÃO CAVEIRA </h1>
        <p class="text-slate-400 font-medium">Aplicação da Lei Penal no Tempo e Espaço</p>
    </header>

    <main class="w-full max-w-lg">
        
        <div class="mb-6 px-2">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Progresso da Missão</span>
                <span id="counter" class="text-sm font-bold text-amber-500">01 / 25</span>
            </div>
            <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="h-full bg-amber-500 shadow-[0_0_10px_#fbbf24] transition-all duration-500" style="width: 4%"></div>
            </div>
        </div>

        <div id="card-container" class="flip-card mb-8 group">
            <div class="flip-card-inner" onclick="toggleFlip()">
                <div class="flip-card-front">
                    <i class="fas fa-gavel text-slate-500 mb-6 text-2xl"></i>
                    <h2 class="text-xs font-black text-amber-500 uppercase tracking-[0.3em] mb-4">Artigo / Tópico</h2>
                    <p id="front-text" class="text-xl md:text-2xl font-bold text-center leading-tight tracking-tight"></p>
                    <div class="mt-8 text-slate-500 text-[10px] uppercase font-bold animate-pulse">Clique para revelar a resposta</div>
                </div>
                <div class="flip-card-back">
                    <i class="fas fa-shield-halved text-amber-500 mb-6 text-2xl"></i>
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Fundamentação Jurídica</h2>
                    <p id="back-text" class="text-lg md:text-xl text-center leading-relaxed font-medium italic text-slate-100"></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="prevCard()" class="py-3 bg-slate-800 hover:bg-slate-700 rounded border-b-4 border-slate-900 active:border-b-0 transition-all flex items-center justify-center">
                <i class="fas fa-arrow-left text-slate-400"></i>
            </button>
            <button onclick="toggleFlip()" class="py-3 bg-amber-600 hover:bg-amber-500 text-white font-black rounded border-b-4 border-amber-800 active:border-b-0 transition-all uppercase text-xs tracking-widest">
                Revelar
            </button>
            <button onclick="nextCard()" class="py-3 bg-slate-800 hover:bg-slate-700 rounded border-b-4 border-slate-900 active:border-b-0 transition-all flex items-center justify-center">
                <i class="fas fa-arrow-right text-slate-400"></i>
            </button>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 backdrop-blur-sm">
            <p class="text-[10px] font-black text-center text-slate-500 uppercase mb-3 tracking-widest">Avaliação de Memorização</p>
            <div class="flex justify-between gap-2">
                <button onclick="nextCard()" class="status-btn flex-1 py-2 bg-red-900/30 hover:bg-red-900/50 text-red-500 text-[10px] font-bold rounded border border-red-900/50">DIFÍCIL</button>
                <button onclick="nextCard()" class="status-btn flex-1 py-2 bg-blue-900/30 hover:bg-blue-900/50 text-blue-500 text-[10px] font-bold rounded border border-blue-900/50">MÉDIO</button>
                <button onclick="nextCard()" class="status-btn flex-1 py-2 bg-green-900/30 hover:bg-green-900/50 text-green-500 text-[10px] font-bold rounded border border-green-900/50">FÁCIL</button>
            </div>
        </div>

        <div class="mt-8 flex justify-between items-center px-2">
            <button onclick="shuffleCards()" class="text-[10px] font-bold text-slate-500 hover:text-amber-500 transition uppercase tracking-widest">
                <i class="fas fa-shuffle mr-1"></i> Reordenar Deck
            </button>
            <span class="text-[10px] font-bold text-slate-600 uppercase">QAP / QRV</span>
        </div>

    </main>

    <script>
        const flashcards = [
            { front: "Teoria da Atividade (Art. 4º CP)", back: "Considera-se praticado o crime no momento da ação ou omissão, ainda que outro seja o momento do resultado." },
            { front: "Teoria da Ubiquidade (Art. 6º CP)", back: "Considera-se praticado o crime no lugar em que ocorreu a ação/omissão, bem como onde se produziu ou deveria produzir-se o resultado." },
            { front: "Mnemônico LUTA", back: "Lugar = Ubiquidade;\nTempo = Atividade." },
            { front: "Súmula 711 do STF", back: "A lei penal mais grave aplica-se ao crime continuado ou permanente, se a sua vigência é anterior à cessação da continuidade ou permanência." },
            { front: "Abolitio Criminis", back: "Lei nova que deixa de considerar o fato como criminoso. Extingue a punibilidade e os efeitos penais da condenação." },
            { front: "Novatio Legis in Mellius", back: "Lei nova que, sem excluir o crime, traz disposições que favorecem o agente de qualquer modo. Deve retroagir." },
            { front: "Novatio Legis in Pejus", back: "Lei nova que agrava a situação do réu. Em regra, não retroage." },
            { front: "Mnemônico PRO-GENI-PRE", back: "Extraterritorialidade Incondicionada: Patrimônio/Fé Pública; Genocídio; Presidente da República." },
            { front: "Território por Extensão (Público)", back: "Embarcações e aeronaves brasileiras públicas ou a serviço do governo, onde quer que se encontrem." },
            { front: "Lei de Tortura (9.455/97)", back: "Aplica-se se a vítima for brasileira ou se o agente estiver em local sob jurisdição brasileira." },
            { front: "Princípio da Especialidade", back: "A norma especial afasta a aplicação da norma geral (Lex specialis derogat legi generali)." },
            { front: "Momento da Maioridade Penal", back: "Define-se no momento da conduta, seguindo a Teoria da Atividade." }
        ];

        let currentIndex = 0;

        function updateCard() {
            const container = document.getElementById('card-container');
            container.classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('front-text').innerText = flashcards[currentIndex].front;
                document.getElementById('back-text').innerText = flashcards[currentIndex].back;
                
                const current = currentIndex + 1;
                const total = flashcards.length;
                const percent = (current / total) * 100;
                
                document.getElementById('counter').innerText = `${current.toString().padStart(2, '0')} / ${total}`;
                document.getElementById('progress-bar').style.width = `${percent}%`;
            }, 150);
        }

        function toggleFlip() {
            document.getElementById('card-container').classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % flashcards.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
            updateCard();
        }

        function shuffleCards() {
            flashcards.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }

        // Atalhos de teclado
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); toggleFlip(); }
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
        });

        window.onload = updateCard;
    </script>
    
</body>
</html>
